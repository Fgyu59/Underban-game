name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip wget python3-pip build-essential libffi-dev libssl-dev zlib1g-dev
      
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython
      
      - name: Build
        run: |
          yes | buildozer android debug
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
